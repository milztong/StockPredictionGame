# Database — reads from env var if set, falls back to local Supabase URL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.idzkricnzzdpvcbzxayh.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_supabase_password}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Alpha Vantage
alphavantage.api.key=${ALPHAVANTAGE_API_KEY:your_key_here}

# JWT
jwt.secret=${JWT_SECRET:your_secret_here}
jwt.expiry.ms=${JWT_EXPIRY_MS:86400000}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Server
server.port=8080
