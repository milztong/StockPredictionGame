# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.dgjvorttyxvfxgypmvio.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Alpha Vantage
alphavantage.api.key=${ALPHAVANTAGE_API_KEY:your_key}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiry.ms=${JWT_EXPIRY_MS:86400000}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Server
server.port=8080
