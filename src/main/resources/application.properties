# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.dgjvorttyxvfxgypmvio.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Admin
admin.trigger.secret=${ADMIN_TRIGGER_SECRET:change-me-in-production}

# Polygon.io
polygon.api.key=${POLYGON_API_KEY:your_key}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiry.ms=${JWT_EXPIRY_MS:86400000}

# CORS
frontend.url=${FRONTEND_URL:http://localhost:3000}

# PulseStack Integration
# In der integrierten docker-compose Umgebung immer aktiv.
# Für lokale Standalone-Entwicklung: auskommentieren.
pulsestack.ingest.url=${PULSESTACK_INGEST_URL:http://localhost:8081}
pulsestack.ingest.secret=${PULSESTACK_INGEST_SECRET:change-me-in-production}
pulsestack.predictor.base-url=${PREDICTOR_BASE_URL:http://localhost:8085}

# Server
# Port 8085 wenn als PulseStack Microservice gestartet (docker-compose)
# Port 8080 für lokale Standalone-Entwicklung
server.port=${SERVER_PORT:8080}

